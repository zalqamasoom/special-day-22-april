<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Moona!</title>
    <style>
        body {
            background-color: #fff0f6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        h1 { color: #d81b60; margin-bottom: 30px; text-shadow: 2px 2px #f8bbd0; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }
        .photo-card {
            background: white;
            padding: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            border: 1px solid #eee;
        }
        .photo-card:nth-child(odd) { transform: rotate(-3deg); }
        .photo-card:nth-child(even) { transform: rotate(2deg); }

        .photo-card:hover {
            transform: scale(1.1) rotate(0deg);
            z-index: 10;
            box-shadow: 0 12px 20px rgba(216, 27, 96, 0.2);
        }
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 2px;
        }
        .caption {
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
            color: #d81b60;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h1>Happy Birthday Moona! 🎂✨</h1>

    <div style="margin-bottom: 20px;">
        <iframe width="0" height="0" src="https://www.youtube.com/embed/https://www.youtube.com/results?search_query=happy+birthday+jan" frameborder="0" allow="autoplay&loop=1&playlist=YOUR_VIDEO_ID"></iframe>
        <p style="font-size: 12px; color: #888;">(Press any key to start the birthday music! 🎵)</p>
    </div>

    <div class="gallery">
        <div class="photo-card"><img src="pic1.jpg"><div class="caption">Memory 1 ❤️</div></div>
        <div class="photo-card"><img src="pic2.jpg"><div class="caption">Memory 2 🌟</div></div>
        <div class="photo-card"><img src="pic3.jpg"><div class="caption">Memory 3 📸</div></div>
        <div class="photo-card"><img src="pic4.jpg"><div class="caption">Memory 4 ✨</div></div>
        <div class="photo-card"><img src="pic5.jpg"><div class="caption">Memory 5 🎈</div></div>
        <div class="photo-card"><img src="pic6.jpg"><div class="caption">Memory 6 🌸</div></div>
        <div class="photo-card"><img src="pic7.jpg"><div class="caption">Memory 7 🍭</div></div>
        <div class="photo-card"><img src="pic8.jpg"><div class="caption">Memory 8 🎀</div></div>
        <div class="photo-card"><img src="pic9.jpg"><div class="caption">Memory 9 💎</div></div>
        <div class="photo-card"><img src="pic10.jpg"><div class="caption">Bestie Forever 👑</div></div>
    </div>

</body>
</html>
